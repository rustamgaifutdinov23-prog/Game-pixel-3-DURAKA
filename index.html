// ─── HELPERS ─────────────────────────────────────
const dist=(x1,y1,x2,y2)=>Math.sqrt((x2-x1)**2+(y2-y1)**2);
const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function angleToDir(a) {
  const n=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if (n<Math.PI*0.25||n>=Math.PI*1.75) return 'right';
  if (n<Math.PI*0.75) return 'down';
  if (n<Math.PI*1.25) return 'left';
  return 'up';
}
function dirToFrame(dir, fw, fh) {
  return { down:[0,0,fw,fh], up:[fw,0,fw,fh], left:[0,fh,fw,fh], right:[fw,fh,fw,fh] }[dir]||[0,0,fw,fh];
}
function isSolid(wx,wy) {
  return false; // открытый мир — границы обрабатываются clamp в движении
}
function findNearest(x,y,maxR=9999) {
  let best=null, bd=maxR;
  for (const m of monsters) {
    if (m.dead) continue;
    const d=dist(x,y,m.x,m.y);
    if (d<bd) { bd=d; best=m; }
  }
  return best;
}
function burst(x,y,col,n=10) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:500+Math.random()*300,ml:800});
  }
}

// Рисует направленный спрайт персонажа по мировым → экранным координатам
// dir: 'down'|'up'|'left'|'right' → маппинг в 'front'|'back'|left|right
function drawCharSprite(sprName, dir, sx, sy, tgtH) {
  const dk = dir==='down'?'front' : dir==='up'?'back' : dir;
  const img = imgs[sprName+'_'+dk] || imgs[sprName+'_front'];
  if (!img) return false;
  const sc = tgtH / img.height;
  const dw = img.width * sc;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, sx-dw/2, sy-tgtH, dw, tgtH);
  ctx.imageSmoothingEnabled = false;
  return true;
}

// ─── MAP ─────────────────────────────────────────
function genMap() {
  tilemap=[];
  for (let y=0;y<MH;y++) { tilemap[y]=[]; for (let x=0;x<MW;x++) tilemap[y][x]=0; }
  for (let i=0;i<120;i++) {
    const px=2+Math.floor(Math.random()*(MW-4)), py=2+Math.floor(Math.random()*(MH-4));
    const rw=2+Math.floor(Math.random()*7), rh=2+Math.floor(Math.random()*7);
    for (let dy=0;dy<rh;dy++) for (let dx=0;dx<rw;dx++)
      if (py+dy<MH&&px+dx<MW) tilemap[py+dy][px+dx]=1;
  }
  for (let i=0;i<6;i++) {
    const sy=Math.floor(MH/7)*(i+1);
    for (let x=0;x<MW;x++) if (sy<MH) tilemap[sy][x]=2;
  }
  for (let i=0;i<300;i++) {
    const tx=2+Math.floor(Math.random()*(MW-4)), ty=2+Math.floor(Math.random()*(MH-4));
    if (Math.abs(tx-MW/2)>5||Math.abs(ty-MH/2)>5) tilemap[ty][tx]=3;
  }
  for (let i=0;i<8;i++) {
    const wx=5+Math.floor(Math.random()*(MW-10)), wy=5+Math.floor(Math.random()*(MH-10));
    for (let dy=0;dy<4;dy++) for (let dx=0;dx<5;dx++)
      if (wy+dy<MH&&wx+dx<MW) tilemap[wy+dy][wx+dx]=4;
  }
  const cx=Math.floor(MW/2), cy=Math.floor(MH/2);
  for (let dy=-4;dy<=4;dy++) for (let dx=-4;dx<=4;dx++) {
    if (cy+dy>=0&&cy+dy<MH&&cx+dx>=0&&cx+dx<MW) tilemap[cy+dy][cx+dx]=1;
  }
}

function drawMapBg() {
  const img = imgs['map'];
  if (!img) {
    ctx.fillStyle='#2a4a2a';
    ctx.fillRect(0,0,C.width,C.height);
    return;
  }
  // Рендерим только видимый участок карты
  const srcX = cam.x / PW * img.width;
  const srcY = cam.y / PH * img.height;
  const srcW = C.width  / PW * img.width;
  const srcH = C.height / PH * img.height;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, C.width, C.height);
  ctx.imageSmoothingEnabled = false;
}

function getSkillChoices(player) {
  const acquired = player.skills;
  const choices = [];
  // First try weapon unlocks the player doesn't have
  const missing = WEAPON_UNLOCKS.filter(u => !player.weapons.some(w=>w.id===u.weapId));
  // Build pool
  const pool = [...SKILLS_DEF.filter(s=>{
    const lvl = acquired.get(s.id)||0;
    return lvl < s.max;
  })];
  if (missing.length > 0 && Math.random() < 0.4) {
    pool.push(rnd(missing));
  }
  // shuffle
  for (let i=pool.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0, 3);
}

// ─── XP GEM ──────────────────────────────────────
class XPGem {
  constructor(x,y,val) { this.x=x; this.y=y; this.val=val; this.dead=false; this.t=0; }
  update(dt) {
    this.t+=dt;
    if (!player) return;
    const d=dist(this.x,this.y,player.x,player.y);
    const mag=player.getXpRadius();
    if (d<mag) {
      const ang=Math.atan2(player.y-this.y,player.x-this.x);
      const pull=lerp(2, 12, 1-d/mag);
      this.x+=Math.cos(ang)*pull;
      this.y+=Math.sin(ang)*pull;
    }
    if (d<18) { player.gainXP(this.val); this.dead=true; }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-20||sy<-20||sx>C.width+20||sy>C.height+20) return;
    const bob=Math.sin(this.t*0.005)*2;
    ctx.fillStyle='#8844ff'; ctx.strokeStyle='#cc88ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sx,sy+bob,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(180,100,255,0.5)'; ctx.beginPath(); ctx.arc(sx-1,sy+bob-2,2,0,Math.PI*2); ctx.fill();
  }
}

// ─── CHEST ────────────────────────────────────────
class Chest {
  constructor(x,y) { this.x=x; this.y=y; this.dead=false; this.t=0; }
  update(dt) {
    this.t+=dt;
    if (!player||this.dead) return;
    if (dist(this.x,this.y,player.x,player.y)<30) {
      this.dead=true;
      chestsOpened++;
      pendingChest=this;
      const choices=getSkillChoices(player);
      if (choices.length>0) {
        pendingUpgrades=choices;
        STATE='CHEST';
      }
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-30||sy<-30||sx>C.width+30||sy>C.height+30) return;
    const bob=Math.sin(this.t*0.003)*3;
    // Golden box
    ctx.fillStyle='#cc9900';
    ctx.fillRect(sx-12,sy-10+bob,24,20);
    ctx.fillStyle='#ffcc00';
    ctx.fillRect(sx-10,sy-8+bob,20,8);
    ctx.fillStyle='#885500';
    ctx.fillRect(sx-2,sy-4+bob,4,8);
    // Glow
    ctx.strokeStyle='rgba(255,220,0,0.6)';
    ctx.lineWidth=2;
    ctx.strokeRect(sx-14,sy-12+bob,28,24);
  }
}

// ─── WEAPONS ─────────────────────────────────────
class Weapon {
  constructor(id, player) {
    this.id = id;
    this.player = player;
    this.timer = 0;
    // Dagger orbit state
    this.dagAngle = 0;
    // Holy cross projectiles
    this.crosses = [];
    // Staff
    this.staffProjs = [];
    // Fire ring
    this.rings = [];
    // Lightning visual
    this.lightningLines = [];
    // Dagger hit cooldowns: Map enemyId -> timer
    this.dagHitCd = new Map();
  }

  getCooldown() {
    const base = { dagger:400, holy_cross:3000, staff:1500, fire_ring:2500, lightning:3000 }[this.id]||1000;
    return base / this.player.getAtkSpdMult();
  }

  getArea() { return this.player.getAreaMult(); }
  getDmg() {
    let d = this.player.baseDmg * this.player.getdmgMult();
    if (Math.random() < this.player.getCritChance()) d *= 2;
    return Math.floor(d);
  }
  getPierce() { return this.player.mods.pierce; }
  getExtraProj() { return this.player.mods.extraProj; }
  getDurMult() { return 1 + this.player.mods.durMult; }

  update(dt) {
    this.timer -= dt;

    // Update lightning visuals
    this.lightningLines = this.lightningLines.filter(l=>{ l.timer-=dt; return l.timer>0; });
    // Update dagger hit cooldowns
    for (const [k,v] of this.dagHitCd) { this.dagHitCd.set(k, v-dt); if (v-dt<=0) this.dagHitCd.delete(k); }

    if (this.id==='dagger') {
      this.dagAngle += 2 * dt/1000;
      // Do damage check each frame
      const count = 2 + this.getExtraProj();
      const r = 65;
      for (let i=0;i<count;i++) {
        const a = this.dagAngle + (i/count)*Math.PI*2;
        const dx2 = this.player.x + Math.cos(a)*r;
        const dy2 = this.player.y + Math.sin(a)*r;
        for (const m of monsters) {
          if (m.dead) continue;
          if (dist(dx2,dy2,m.x,m.y)<14) {
            const key = m.uid||0;
            if (!this.dagHitCd.has(key)||this.dagHitCd.get(key)<=0) {
              this.dagHitCd.set(key, 400);
              m.takeDmg(this.getDmg());
            }
          }
        }
      }
    }

    if (this.id==='holy_cross') {
      // Update existing crosses
      for (const cr of this.crosses) {
        cr.x += cr.vx * dt/1000;
        cr.y += cr.vy * dt/1000;
        cr.life -= dt;
        cr.t += dt;
        // Bounce off world edges
        if (cr.x<10||cr.x>PW-10) { cr.vx*=-1; cr.x=clamp(cr.x,10,PW-10); }
        if (cr.y<10||cr.y>PH-10) { cr.vy*=-1; cr.y=clamp(cr.y,10,PH-10); }
        // Damage
        for (const m of monsters) {
          if (m.dead) continue;
          if (!cr.hit.has(m.uid||0)&&dist(cr.x,cr.y,m.x,m.y)<18) {
            cr.hit.add(m.uid||0);
            m.takeDmg(this.getDmg());
            if (cr.pierce <= 0) cr.life = 0;
            else cr.pierce--;
          }
        }
      }
      this.crosses = this.crosses.filter(cr=>cr.life>0);
      // Spawn new
      if (this.timer<=0) {
        this.timer = this.getCooldown();
        const count = 1 + this.getExtraProj();
        for (let i=0;i<count;i++) {
          const angles = [Math.PI*0.25, Math.PI*0.75, -Math.PI*0.25, -Math.PI*0.75];
          const a = angles[i%4] + (Math.random()-0.5)*0.2;
          this.crosses.push({
            x:this.player.x, y:this.player.y,
            vx:Math.cos(a)*200, vy:Math.sin(a)*200,
            life:5000*this.getDurMult(), t:0,
            hit:new Set(), pierce:this.getPierce()
          });
        }
      }
    }

    if (this.id==='staff') {
      if (this.timer<=0) {
        this.timer = this.getCooldown();
        const tgt = findNearest(this.player.x, this.player.y, 999);
        if (tgt) {
          const baseAng = Math.atan2(tgt.y-this.player.y, tgt.x-this.player.x);
          const count = 1 + this.getExtraProj();
          for (let i=0;i<count;i++) {
            const spread = 0.15;
            const a = baseAng + (i-(count-1)/2)*spread;
            projectiles.push(new Proj(this.player.x, this.player.y, a, 320, this.getDmg(), '#00ffcc', 'staff', 999, this.getPierce()));
          }
        }
      }
    }

    if (this.id==='fire_ring') {
      // Update rings
      for (const ring of this.rings) {
        ring.r += 120 * dt/1000;
        ring.life -= dt;
        const maxR = 150 * this.getArea();
        if (ring.r > maxR) ring.life = 0;
        // Damage enemies that are within ring band
        for (const m of monsters) {
          if (m.dead) continue;
          const d = dist(ring.ox,ring.oy,m.x,m.y);
          if (!ring.hit.has(m.uid||0) && d > ring.r-15 && d < ring.r+15) {
            ring.hit.add(m.uid||0);
            m.takeDmg(this.getDmg());
          }
        }
      }
      this.rings = this.rings.filter(r=>r.life>0);
      if (this.timer<=0) {
        this.timer = this.getCooldown();
        this.rings.push({ ox:this.player.x, oy:this.player.y, r:10, life:4000*this.getDurMult(), hit:new Set() });
      }
    }

    if (this.id==='lightning') {
      if (this.timer<=0) {
        this.timer = this.getCooldown();
        const count = 1 + this.getExtraProj();
        const targets = [];
        // Get random nearby enemies
        const candidates = monsters.filter(m=>!m.dead && dist(this.player.x,this.player.y,m.x,m.y)<500);
        for (let i=0;i<count&&candidates.length>0;i++) {
          const idx = Math.floor(Math.random()*candidates.length);
          const tgt = candidates.splice(idx,1)[0];
          targets.push(tgt);
          tgt.takeDmg(this.getDmg());
        }
        // Add visuals
        for (const tgt of targets) {
          this.lightningLines.push({ x1:this.player.x, y1:this.player.y, x2:tgt.x, y2:tgt.y, timer:150 });
        }
      }
    }
  }

  draw() {
    if (this.id==='dagger') {
      const count = 2 + this.getExtraProj();
      const r = 65;
      for (let i=0;i<count;i++) {
        const a = this.dagAngle + (i/count)*Math.PI*2;
        const dx2 = this.player.x + Math.cos(a)*r - cam.x;
        const dy2 = this.player.y + Math.sin(a)*r - cam.y;
        ctx.save();
        ctx.translate(dx2,dy2);
        ctx.rotate(a+Math.PI/2);
        ctx.fillStyle='#aaaaff';
        ctx.fillRect(-3,-10,6,20);
        ctx.fillStyle='#8888ff';
        ctx.fillRect(-6,-2,12,4);
        ctx.restore();
      }
    }

    if (this.id==='holy_cross') {
      for (const cr of this.crosses) {
        const sx=cr.x-cam.x, sy=cr.y-cam.y;
        if (sx<-40||sy<-40||sx>C.width+40||sy>C.height+40) continue;
        ctx.save();
        ctx.translate(sx,sy);
        ctx.rotate(cr.t*0.002);
        ctx.fillStyle='#ffffaa';
        ctx.fillRect(-3,-12,6,24);
        ctx.fillRect(-12,-3,24,6);
        ctx.restore();
      }
    }

    if (this.id==='fire_ring') {
      for (const ring of this.rings) {
        const sx=ring.ox-cam.x, sy=ring.oy-cam.y;
        if (sx<-ring.r-20||sy<-ring.r-20||sx>C.width+ring.r+20||sy>C.height+ring.r+20) continue;
        const alpha = ring.life/4000;
        ctx.save();
        ctx.globalAlpha = Math.min(alpha*2, 0.7);
        ctx.strokeStyle='#ff6600';
        ctx.lineWidth=15;
        ctx.beginPath();
        ctx.arc(sx,sy,ring.r,0,Math.PI*2);
        ctx.stroke();
        ctx.strokeStyle='#ffaa00';
        ctx.lineWidth=4;
        ctx.beginPath();
        ctx.arc(sx,sy,ring.r,0,Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }

    if (this.id==='lightning') {
      for (const ln of this.lightningLines) {
        const alpha = ln.timer/150;
        const sx1=ln.x1-cam.x, sy1=ln.y1-cam.y;
        const sx2=ln.x2-cam.x, sy2=ln.y2-cam.y;
        ctx.save();
        ctx.globalAlpha=alpha;
        ctx.strokeStyle='#aaaaff';
        ctx.lineWidth=3;
        ctx.shadowColor='#8888ff';
        ctx.shadowBlur=10;
        ctx.beginPath();
        ctx.moveTo(sx1,sy1);
        // Jagged line
        const steps=6;
        for (let i=1;i<steps;i++) {
          const t=i/steps;
          const jx=lerp(sx1,sx2,t)+(Math.random()-0.5)*20;
          const jy=lerp(sy1,sy2,t)+(Math.random()-0.5)*20;
          ctx.lineTo(jx,jy);
        }
        ctx.lineTo(sx2,sy2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

// ─── PROJECTILE ──────────────────────────────────
let projUID = 0;
class Proj {
  constructor(x,y,ang,spd,dmg,col,type,range=999,pierce=0) {
    this.x=x; this.y=y; this.vx=Math.cos(ang)*spd; this.vy=Math.sin(ang)*spd;
    this.dmg=dmg; this.col=col; this.type=type; this.range=range;
    this.pierce=pierce; this.dead=false; this.dist=0; this.uid=projUID++;
  }
  update(dt) {
    const dx2=this.vx*dt/1000*60, dy2=this.vy*dt/1000*60;
    // Use pixel/sec properly: vx is px/sec
    const mvx=this.vx*dt/1000, mvy=this.vy*dt/1000;
    this.x+=mvx; this.y+=mvy;
    this.dist+=Math.sqrt(mvx*mvx+mvy*mvy);
    if (this.dist>this.range||this.x<0||this.x>PW||this.y<0||this.y>PH) { this.dead=true; return; }
    for (const m of monsters) {
      if (m.dead) continue;
      if (dist(this.x,this.y,m.x,m.y)<m.sz) {
        m.takeDmg(this.dmg);
        if (this.pierce>0) { this.pierce--; }
        else { this.dead=true; return; }
      }
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-20||sy<-20||sx>C.width+20||sy>C.height+20) return;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(sx-2,sy-2,3,0,Math.PI*2); ctx.fill();
  }
}

// ─── PLAYER ──────────────────────────────────────
class Player {
  constructor(cfg) {
    this.cfg=cfg;
    this.x=MW/2*TW; this.y=MH/2*TW;
    // Base stats from STR/AGI/LCK/VIT/INT
    this.str=cfg.str; this.agi=cfg.agi; this.lck=cfg.lck; this.vit=cfg.vit; this.int=cfg.int;
    this.baseDmg = 8 + cfg.str*2;
    this.baseSpeed = 1.5 + cfg.agi*0.18;
    this.baseXpRadius = 70 + cfg.int*5;
    this.baseCrit = 0.02 + cfg.lck*0.012;
    const baseMaxHp = 60 + cfg.vit*8;
    this.hp = baseMaxHp;
    this.maxHp = baseMaxHp;
    // Modifiers object
    this.mods = {
      dmgMult:0, spdAdd:0, atkSpdMult:0, xpRadAdd:0,
      maxHpAdd:0, hpRegenAdd:0, critAdd:0, dxpAdd:0,
      thornsDmg:0, thornsRad:0, slowRad:0, slowPct:0,
      extraProj:0, pierce:0, areaMult:0, durMult:0
    };
    // Apply passive based on character
    this._applyCharPassive();
    // Skills map
    this.skills = new Map();
    // Weapons
    this.weapons = [new Weapon(cfg.startWeapon, this)];
    // State
    this.dir='down'; this.faceAngle=0;
    this.xp=0; this.level=1; this.xpNext=50;
    this.invincible=0;
    this.animT=0; this.animFrame=0; this.moving=false;
    this.regenAccum=0;
  }

  _applyCharPassive() {
    if (this.cfg.id==='gpu') {
      // every 3 AGI -> +10% atk speed
      this.mods.atkSpdMult += Math.floor(this.agi/3)*0.10;
    } else if (this.cfg.id==='hipster') {
      // every 2 LCK -> +10% double xp chance
      this.mods.dxpAdd += Math.floor(this.lck/2)*0.10;
    } else if (this.cfg.id==='ginger') {
      // every 4 VIT -> +1 HP regen/sec
      this.mods.hpRegenAdd += Math.floor(this.vit/4)*1;
    } else if (this.cfg.id==='mage') {
      // every 3 INT -> +15% weapon area
      this.mods.areaMult += Math.floor(this.int/3)*0.15;
    } else if (this.cfg.id==='adventurer') {
      // every 2 LCK -> +10% chest drop (stored but used at boss death)
      // No direct modifier needed, checked at boss death
    }
  }

  getChestDropChance() {
    if (this.cfg.id==='adventurer') {
      return 1.0 + Math.floor(this.lck/2)*0.10;
    }
    return 1.0;
  }

  getdmgMult() { return 1 + this.mods.dmgMult; }
  getAtkSpdMult() { return 1 + this.mods.atkSpdMult; }
  getXpRadius() { return this.baseXpRadius + this.mods.xpRadAdd; }
  getCritChance() { return Math.min(0.9, this.baseCrit + this.mods.critAdd); }
  getSpeed() { return this.baseSpeed + this.mods.spdAdd; }
  getAreaMult() { return 1 + this.mods.areaMult; }
  getDoubleXpChance() { return this.mods.dxpAdd; }
  getMaxHp() { return this.maxHp; }

  gainXP(amt) {
    let finalAmt = amt;
    if (Math.random() < this.getDoubleXpChance()) finalAmt *= 2;
    this.xp += finalAmt;
    if (this.xp >= this.xpNext) {
      this.xp -= this.xpNext;
      this.xpNext = Math.floor(this.xpNext*1.55);
      this.level++;
      burst(this.x, this.y, '#ffff00', 20);
      const choices = getSkillChoices(this);
      if (choices.length>0) {
        pendingUpgrades = choices;
        STATE='LEVELUP'
       
      }
    }
  }

  applySkill(skillData) {
    // Check if it's a weapon unlock
    const wu = WEAPON_UNLOCKS.find(u=>u.id===skillData.id);
    if (wu) {
      if (!this.weapons.some(w=>w.id===wu.weapId)) {
        const w = new Weapon(wu.weapId, this);
        this.weapons.push(w);
      }
      return;
    }
    const cur = this.skills.get(skillData.id)||0;
    this.skills.set(skillData.id, cur+1);
    switch(skillData.id) {
      case 'power_up':    this.mods.dmgMult += 0.20; break;
      case 'speed_up':    this.mods.spdAdd += 0.3; break;
      case 'atk_spd_up':  this.mods.atkSpdMult += 0.15; break;
      case 'magnet':      this.mods.xpRadAdd += 40; break;
      case 'max_hp':      this.mods.maxHpAdd += 30; this.maxHp+=30; this.hp=Math.min(this.hp+30, this.maxHp); break;
      case 'regen':       this.mods.hpRegenAdd += 1; break;
      case 'crit':        this.mods.critAdd += 0.10; break;
      case 'double_xp':   this.mods.dxpAdd += 0.15; break;
      case 'thorns':      this.mods.thornsDmg += 8; this.mods.thornsRad = Math.max(80, this.mods.thornsRad+20); break;
      case 'slow_aura':   this.mods.slowRad = Math.max(150, this.mods.slowRad+30); this.mods.slowPct = Math.min(0.8, this.mods.slowPct+0.35); break;
      case 'multishot':   this.mods.extraProj += 1; break;
      case 'piercing':    this.mods.pierce += 1; break;
      case 'area_up':     this.mods.areaMult += 0.25; break;
      case 'duration_up': this.mods.durMult += 0.20; break;
    }
  }

  getFaceAngle() {
    let dx=0,dy=0;
    if (keys.has('KeyW')||keys.has('ArrowUp'))    dy=-1;
    if (keys.has('KeyS')||keys.has('ArrowDown'))  dy+=1;
    if (keys.has('KeyA')||keys.has('ArrowLeft'))  dx-=1;
    if (keys.has('KeyD')||keys.has('ArrowRight')) dx+=1;
    if (dx!==0||dy!==0) { this.faceAngle=Math.atan2(dy,dx); return this.faceAngle; }
    const near=findNearest(this.x,this.y,400);
    if (near) { this.faceAngle=Math.atan2(near.y-this.y,near.x-this.x); }
    return this.faceAngle;
  }

  update(dt) {
    if (STATE!=='GAME') return;
    if (this.invincible>0) this.invincible-=dt;

    // Movement
    let dx=0,dy=0;
    const spd=this.getSpeed();
    if (keys.has('KeyW')||keys.has('ArrowUp'))    dy-=spd;
    if (keys.has('KeyS')||keys.has('ArrowDown'))  dy+=spd;
    if (keys.has('KeyA')||keys.has('ArrowLeft'))  dx-=spd;
    if (keys.has('KeyD')||keys.has('ArrowRight')) dx+=spd;
    this.moving=(dx!==0||dy!==0);
    if (dx!==0&&dy!==0) { dx*=0.707; dy*=0.707; }
    const hw=12, hh=12;
    const nx=this.x+dx, ny=this.y+dy;
    if (!isSolid(nx-hw,this.y-hh)&&!isSolid(nx+hw,this.y-hh)&&!isSolid(nx-hw,this.y+hh)&&!isSolid(nx+hw,this.y+hh))
      this.x=clamp(nx, TW, PW-TW);
    if (!isSolid(this.x-hw,ny-hh)&&!isSolid(this.x+hw,ny-hh)&&!isSolid(this.x-hw,ny+hh)&&!isSolid(this.x+hw,ny+hh))
      this.y=clamp(ny, TW, PH-TW);

    // Direction
    const fa=this.getFaceAngle();
    this.dir=angleToDir(fa);

    // Animate
    this.animT+=dt;
    if (this.animT>220) { this.animT=0; this.animFrame=(this.animFrame+1)%2; }

    // Update weapons
    for (const w of this.weapons) w.update(dt);

    // Thorns
    if (this.mods.thornsDmg>0 && this.mods.thornsRad>0) {
      for (const m of monsters) {
        if (!m.dead && dist(this.x,this.y,m.x,m.y)<this.mods.thornsRad) {
          m.takeDmg(this.mods.thornsDmg * dt/1000);
        }
      }
    }

    // Slow aura
    if (this.mods.slowRad>0) {
      for (const m of monsters) {
        if (!m.dead) {
          m.slowed = dist(this.x,this.y,m.x,m.y) < this.mods.slowRad;
          m.slowPct = this.mods.slowPct;
        }
      }
    }

    // HP regen
    const totalRegen = this.mods.hpRegenAdd;
    if (totalRegen>0) {
      this.regenAccum+=dt;
      while (this.regenAccum>=1000) {
        this.regenAccum-=1000;
        this.hp=Math.min(this.hp+totalRegen, this.maxHp);
      }
    }

    // Camera
    cam.x=clamp(this.x-C.width/2, 0, PW-C.width);
    cam.y=clamp(this.y-C.height/2, 0, PH-C.height);
  }

  takeDmg(dmg) {
    if (this.invincible>0) return;
    this.hp -= dmg;
    this.invincible = 400;
    burst(this.x,this.y,'#ff4444',5);
    if (this.hp<=0) {
      this.hp=0;
      STATE='GAMEOVER';
    }
  }

  drawProcedural(sx,sy) {
    const c=this.cfg.color;
    if (this.cfg.id==='mage') {
      // Purple robe
      ctx.fillStyle='#6644bb';
      ctx.fillRect(sx-10,sy-16,20,28);
      ctx.fillStyle='#8866ff';
      ctx.fillRect(sx-8,sy-24,16,14);
      // Head
      ctx.fillStyle='#ffcc99';
      ctx.beginPath(); ctx.arc(sx,sy-22,8,0,Math.PI*2); ctx.fill();
      // Hat
      ctx.fillStyle='#222266';
      ctx.beginPath();
      ctx.moveTo(sx-12,sy-24); ctx.lineTo(sx,sy-42); ctx.lineTo(sx+12,sy-24);
      ctx.closePath(); ctx.fill();
      // Stars
      ctx.fillStyle='#ffff88';
      ctx.beginPath(); ctx.arc(sx-4,sy-10,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+4,sy-6,2,0,Math.PI*2); ctx.fill();
    } else if (this.cfg.id==='adventurer') {
      // Yellow adventurer
      ctx.fillStyle='#885500';
      ctx.fillRect(sx-9,sy-14,18,26);
      ctx.fillStyle='#cc8800';
      ctx.fillRect(sx-7,sy-22,14,12);
      // Head
      ctx.fillStyle='#ffddaa';
      ctx.beginPath(); ctx.arc(sx,sy-22,8,0,Math.PI*2); ctx.fill();
      // Hat
      ctx.fillStyle='#664400';
      ctx.fillRect(sx-10,sy-30,20,6);
      ctx.fillRect(sx-7,sy-36,14,8);
      // Cape
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();
      ctx.moveTo(sx-8,sy-12); ctx.lineTo(sx-14,sy+8); ctx.lineTo(sx-4,sy+4);
      ctx.closePath(); ctx.fill();
    }
  }

  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    // Flash when invincible
    if (this.invincible>0 && Math.floor(this.invincible/80)%2===1) return;

    if (!drawCharSprite(this.cfg.sprName, this.dir, sx, sy, 72)) {
      this.drawProcedural(sx,sy);
    }

    // Weapon draw
    for (const w of this.weapons) w.draw();

    // Slow aura visual
    if (this.mods.slowRad>0) {
      ctx.globalAlpha=0.08;
      ctx.fillStyle='#44aaff';
      ctx.beginPath(); ctx.arc(sx,sy,this.mods.slowRad,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    // Thorns aura visual
    if (this.mods.thornsRad>0) {
      ctx.globalAlpha=0.08;
      ctx.fillStyle='#44ff44';
      ctx.beginPath(); ctx.arc(sx,sy,this.mods.thornsRad,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

// ─── MONSTER ─────────────────────────────────────
const ENEMY_NORMAL_SPRS = ['dima','kiril','yula'];
const ENEMY_ELITE_SPRS  = ['vadim','Alex','alexandr'];
let monUID = 0;
class Monster {
  constructor(x,y,type,waveNum) {
    this.uid = monUID++;
    this.x=x; this.y=y;
    this.type=type; // 'normal','elite','boss'
    this.dead=false;
    this.t=0;
    this.slowed=false; this.slowPct=0;

    const w = waveNum||wave;
    if (type==='boss') {
      this.hp=500+w*100; this.maxHp=this.hp;
      this.dmg=25; this.baseSpeed=60/1000; this.xpVal=15;
      this.sz=44; this.col='#ff00ff';
      this.isBoss=true;
    } else if (type==='elite') {
      this.hp=80+w*12; this.maxHp=this.hp;
      this.dmg=15; this.baseSpeed=85/1000; this.xpVal=Math.floor(3*(1+(w-1)*0.5));
      this.sz=28; this.col='#ff8800';
      this.isElite=true;
    } else {
      this.hp=25+w*5; this.maxHp=this.hp;
      this.dmg=8; this.baseSpeed=75/1000; this.xpVal=Math.floor(1*(1+(w-1)*0.5));
      this.sz=20; this.col='#cc4422';
    }
    this.speed=this.baseSpeed;
    // Pick sprite
    if (type==='boss') this.sprName=null;
    else if (type==='elite') this.sprName=rnd(ENEMY_ELITE_SPRS);
    else this.sprName=rnd(ENEMY_NORMAL_SPRS);
    this.animFrame=0; this.animT=0;
    this.dir='down';
    this.hitFlash=0;
    this.atkTimer=600+Math.random()*600; // random offset so not all attack at once
  }

  takeDmg(dmg) {
    if (this.dead) return;
    this.hp -= dmg;
    this.hitFlash = 150;
    if (this.hp<=0) {
      this.hp=0;
      this.dead=true;
      kills++;
      gems.push(new XPGem(this.x,this.y, this.xpVal));
      burst(this.x,this.y, this.col,8);
      if (this.isBoss) {
        // Drop chest
        const dropChance = player ? player.getChestDropChance() : 1.0;
        if (Math.random() < dropChance) {
          chests.push(new Chest(this.x, this.y));
        }
      }
    }
  }

  update(dt) {
    if (this.dead) return;
    this.t+=dt;
    this.hitFlash=Math.max(0,this.hitFlash-dt);

    let spd = this.baseSpeed;
    if (this.slowed && this.slowPct>0) spd *= (1-this.slowPct);
    this.slowed=false; // reset each frame, will be set by player update

    if (!player) return;
    const ang = Math.atan2(player.y-this.y, player.x-this.x);
    this.dir = angleToDir(ang);
    const nx=this.x+Math.cos(ang)*spd*dt;
    const ny=this.y+Math.sin(ang)*spd*dt;
    this.x=clamp(nx, this.sz, PW-this.sz);
    this.y=clamp(ny, this.sz, PH-this.sz);

    // Animate
    this.animT+=dt;
    if (this.animT>250) { this.animT=0; this.animFrame=(this.animFrame+1)%2; }

    // Attack player
    this.atkTimer-=dt;
    if (dist(this.x,this.y,player.x,player.y) < this.sz+16 && this.atkTimer<=0) {
      this.atkTimer=1200;
      player.takeDmg(this.dmg);
    }
  }

  drawProcedural(sx,sy) {
    const flash = this.hitFlash>0;
    ctx.fillStyle = flash ? '#ffffff' : this.col;
    if (this.isBoss) {
      ctx.fillRect(sx-this.sz/2, sy-this.sz/2, this.sz, this.sz);
      ctx.fillStyle = flash ? '#ffaaaa' : '#ff00cc';
      ctx.fillRect(sx-this.sz/4, sy-this.sz-8, this.sz/2, 12);
      ctx.font='bold 10px Courier New';
      ctx.fillStyle='#ffffff';
      ctx.textAlign='center';
      ctx.fillText('КАРЕН',sx,sy-this.sz/2-18);
    } else if (this.isElite) {
      ctx.beginPath(); ctx.arc(sx,sy,this.sz,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=flash?'#fff':'#ffcc00'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(sx,sy,this.sz+3,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(sx,sy,this.sz,0,Math.PI*2); ctx.fill();
    }
  }

  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-80||sy<-80||sx>C.width+80||sy>C.height+80) return;

    const flash = this.hitFlash>0;
    const tgtH = this.isBoss?96 : (this.isElite?64:48);
    if (this.sprName) {
      if (flash) ctx.globalAlpha=0.5;
      if (this.isElite) { ctx.save(); ctx.filter='sepia(1) saturate(3) hue-rotate(20deg)'; }
      drawCharSprite(this.sprName, this.dir, sx, sy, tgtH);
      if (this.isElite) ctx.restore();
      if (flash) ctx.globalAlpha=1;
    } else {
      this.drawProcedural(sx,sy);
    }

    // HP bar
    const bw=Math.max(30,this.sz*2), bh=4;
    const bx=sx-bw/2, by=sy-this.sz-12;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    const hpPct=this.hp/this.maxHp;
    ctx.fillStyle=this.isBoss?'#ff00ff':(this.isElite?'#ff8800':'#44dd44');
    ctx.fillRect(bx,by,bw*hpPct,bh);
  }
}

// ─── SPAWN ───────────────────────────────────────
function spawnEnemy() {
  if (monsters.length>=600) return;
  if (!player) return;
  // Spawn outside screen
  const side=Math.floor(Math.random()*4);
  let x,y;
  const margin=80;
  if (side===0) { x=player.x-C.width/2-margin; y=player.y+(Math.random()-0.5)*C.height; }
  else if (side===1) { x=player.x+C.width/2+margin; y=player.y+(Math.random()-0.5)*C.height; }
  else if (side===2) { x=player.x+(Math.random()-0.5)*C.width; y=player.y-C.height/2-margin; }
  else { x=player.x+(Math.random()-0.5)*C.width; y=player.y+C.height/2+margin; }
  x=clamp(x,50,PW-50); y=clamp(y,50,PH-50);
  const eliteChance=0.08+wave*0.02;
  let type='normal';
  if (Math.random()<eliteChance) type='elite';
  monsters.push(new Monster(x,y,type,wave));
}

function drawMinimap() {

  const scaleX=mw/PW, scaleY=mh/PH;
  // Draw a few enemies as dots
  for (const m of monsters) {
    if (m.dead) continue;
    const ex=mx2+m.x*scaleX, ey=my2+m.y*scaleY;
    ctx.fillStyle=m.isBoss?'#ff00ff':(m.isElite?'#ff8800':'#ff4444');

  ctx.fillStyle='#00ff88';
  ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
}

function wrapText(text, cx2, cy2, maxW, lineH, align='center') {
  const words=text.split(' ');
  let line='';
  let y=cy2;
  ctx.textAlign=align;
  for (const word of words) {
    const test=line?line+' '+word:word;
    if (ctx.measureText(test).width>maxW&&line) {
      ctx.fillText(line, cx2, y); line=word; y+=lineH;
    } else { line=test; }
  }
  ctx.fillText(line, cx2, y);
}

// ─── MAIN UPDATE ─────────────────────────────────
let lastTime=0;
function update(now) {
  const dt=Math.min(now-lastTime, 100);
  lastTime=now;

  if (STATE==='GAME') {
    gameTime+=dt;

    // Check win
    if (gameTime>=GAME_DURATION) { STATE='WIN'; }

    // Wave timer
    waveTimer+=dt;
    if (waveTimer>=WAVE_INTERVAL) { waveTimer=0; wave++; }

    // Boss timer
    bossTimer+=dt;
    if (bossTimer>=BOSS_INTERVAL) {
      bossTimer=0;
      // Spawn boss off-screen
      if (player && monsters.length<600) {
        const side=Math.floor(Math.random()*4);
        let bx2,by2;
        const m=120;
        if (side===0) { bx2=player.x-C.width/2-m; by2=player.y+(Math.random()-0.5)*C.height; }
        else if (side===1) { bx2=player.x+C.width/2+m; by2=player.y+(Math.random()-0.5)*C.height; }
        else if (side===2) { bx2=player.x+(Math.random()-0.5)*C.width; by2=player.y-C.height/2-m; }
        else { bx2=player.x+(Math.random()-0.5)*C.width; by2=player.y+C.height/2+m; }
        bx2=clamp(bx2,80,PW-80); by2=clamp(by2,80,PH-80);
        monsters.push(new Monster(bx2,by2,'boss',wave));
      }
    }

    // Spawn rate
    spawnTimer+=dt;
    const spawnInterval = Math.max(100, 600-wave*30);
    while (spawnTimer>=spawnInterval) { spawnTimer-=spawnInterval; spawnEnemy(); }

    // Update player
    if (player) player.update(dt);

    // Update monsters (process dead ones after)
    for (const m of monsters) m.update(dt);
    monsters=monsters.filter(m=>!m.dead);

    // Update projectiles
    for (const p of projectiles) p.update(dt);
    projectiles=projectiles.filter(p=>!p.dead);

    // Update gems
    for (const g of gems) g.update(dt);
    gems=gems.filter(g=>!g.dead);

    // Update chests
    for (const ch of chests) ch.update(dt);
    chests=chests.filter(ch=>!ch.dead);

    // Update particles
    for (const p of particles) {
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93;
      p.life-=dt;
    }
    particles=particles.filter(p=>p.life>0);
  }

  // After update, draw the frame
  draw();
  requestAnimationFrame(update);
}

// ─── MAIN DRAW ───────────────────────────────────
function draw() {
  ctx.clearRect(0,0,C.width,C.height);

  if (STATE==='TITLE') {
    drawTitle();
    return;
  }
  if (STATE==='SELECT') {
    drawSelect();
    return;
  }
  if (STATE==='GAMEOVER') {
    if (player) {
      drawMapBg();
      for (const g of gems) g.draw();
      for (const ch of chests) ch.draw();
      for (const m of monsters) m.draw();
      for (const p of projectiles) p.draw();
      drawParticles();
      player.draw();
    }
    drawGameOver();
    return;
  }
  if (STATE==='WIN') {
    drawWin();
    return;
  }
  if (STATE==='LEVELUP') {
    drawMapBg();
    for (const g of gems) g.draw();
    for (const ch of chests) ch.draw();
    for (const m of monsters) m.draw();
    for (const p of projectiles) p.draw();
    drawParticles();
    if (player) player.draw();
    drawUpgradeScreen('НОВЫЙ УРОВЕНЬ!');
    return;
  }
  if (STATE==='CHEST') {
    drawMapBg();
    for (const g of gems) g.draw();
    for (const ch of chests) ch.draw();
    for (const m of monsters) m.draw();
    for (const p of projectiles) p.draw();
    drawParticles();
    if (player) player.draw();
    drawUpgradeScreen('СУНДУК ОТКРЫТ!');
    return;
  }

  // GAME
  drawMapBg();
  for (const g of gems) g.draw();
  for (const ch of chests) ch.draw();
  for (const m of monsters) m.draw();
  for (const p of projectiles) p.draw();
  drawParticles();
  if (player) player.draw();
  if (player) drawHUD();
}

function drawParticles() {
  for (const p of particles) {
    const sx=p.x-cam.x, sy=p.y-cam.y;
    if (sx<-10||sy<-10||sx>C.width+10||sy>C.height+10) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.ml);
    ctx.fillStyle=p.col;
    ctx.fillRect(sx-2,sy-2,4,4);
  }
  ctx.globalAlpha=1;
}

// ─── BOOT ─────────────────────────────────────────
function waitLoad() {
  if (loaded < total) {
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,C.width,C.height);
    ctx.fillStyle='#00ff88';
    ctx.font='20px Courier New';
    ctx.textAlign='center';
    ctx.fillText('ЗАГРУЗКА... '+loaded+'/'+total, C.width/2, C.height/2);
    ctx.fillStyle='#333';
    ctx.fillRect(C.width/2-100,C.height/2+20,200,12);
    ctx.fillStyle='#00ff88';
    ctx.fillRect(C.width/2-100,C.height/2+20,(loaded/total)*200,12);
    requestAnimationFrame(waitLoad);
    return;
  }
  lastTime=performance.now();
  requestAnimationFrame(update);
}
waitLoad();
</script>
