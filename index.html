// ─── INPUT ───────────────────────────────────────
const keys = new Set();
window.addEventListener('keydown', e => {
  keys.add(e.code);
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  // Keyboard shortcuts for upgrade screen
  if ((STATE==='LEVELUP'||STATE==='CHEST') && ['Digit1','Digit2','Digit3'].includes(e.code)) {
    const idx = parseInt(e.code.replace('Digit',''))-1;
    if (pendingUpgrades[idx]) {
      applyUpgrade(pendingUpgrades[idx]);
    }
  }
  if ((STATE==='LEVELUP'||STATE==='CHEST') && e.code==='Escape') {
    pendingUpgrades=[]; STATE='GAME';
  }
  if (STATE==='GAME' && (e.code==='KeyI'||e.code==='Tab')) {
    e.preventDefault();
    STATE='INVENTORY';
  }
  if (STATE==='INVENTORY' && (e.code==='KeyI'||e.code==='Tab'||e.code==='Escape')) {
    e.preventDefault();
    STATE='GAME';
  }
});
window.addEventListener('keyup', e => keys.delete(e.code));

});

// ─── HELPERS ─────────────────────────────────────
const dist=(x1,y1,x2,y2)=>Math.sqrt((x2-x1)**2+(y2-y1)**2);
const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function angleToDir(a) {
  const n=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if (n<Math.PI*0.25||n>=Math.PI*1.75) return 'right';
  if (n<Math.PI*0.75) return 'down';
  if (n<Math.PI*1.25) return 'left';
  return 'up';
}
function isSolid() { return false; }
function findNearest(x,y,maxR=9999) {
  let best=null, bd=maxR;
  for (const m of monsters) {
    if (m.dead) continue;
    const d=dist(x,y,m.x,m.y);
    if (d<bd) { bd=d; best=m; }
  }
  return best;
}
function burst(x,y,col,n=10) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:500+Math.random()*300,ml:800});
  }
}
function drawCharSprite(sprName, dir, sx, sy, tgtH) {
  const dk = dir==='down'?'front': dir==='up'?'back': dir;
  const img = imgs[sprName+'_'+dk] || imgs[sprName+'_front'];
  if (!img) return false;
  const sc = tgtH / img.height;
  const dw = img.width * sc;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, sx-dw/2, sy-tgtH, dw, tgtH);
  ctx.imageSmoothingEnabled = false;
  return true;
}
function drawEnemySprite(sprKey, sx, sy, tgtH) {
  const img = imgs[sprKey];
  if (!img) return false;
  // Use top portion of sprite sheet (first row = idle/front)
  const frameW = img.width;
  const frameH = Math.min(img.height, img.width); // square-ish frame
  const sc = tgtH / frameH;
  const dw = frameW * sc;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, 0, 0, frameW, frameH, sx-dw/2, sy-tgtH, dw, tgtH);
  ctx.imageSmoothingEnabled = false;
  return true;
}
function wrapText(text, cx2, cy2, maxW, lineH, align='center') {
  const words=text.split(' ');
  let line=''; let y=cy2;
  ctx.textAlign=align;
  for (const word of words) {
    const test=line?line+' '+word:word;
    if (ctx.measureText(test).width>maxW&&line) {
      ctx.fillText(line, cx2, y); line=word; y+=lineH;
    } else { line=test; }
  }
  ctx.fillText(line, cx2, y);
}

// ─── MAP ─────────────────────────────────────────
function drawMapBg() {
  const img = imgs['map'];
  if (!img) { ctx.fillStyle='#2a4a2a'; ctx.fillRect(0,0,C.width,C.height); return; }
  const srcX = cam.x / PW * img.width;
  const srcY = cam.y / PH * img.height;
  const srcW = C.width  / PW * img.width;
  const srcH = C.height / PH * img.height;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, C.width, C.height);
  ctx.imageSmoothingEnabled = false;
}

function getSkillChoices(pl) {
  const pool = SKILLS_DEF.filter(s=>{
    const lvl = pl.skills.get(s.id)||0;
    return lvl < s.max;
  });
  // Shuffle
  for (let i=pool.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool.slice(0,3);
}

function applyUpgrade(sk) {
  if (!player || !sk) return;
  player.applySkill(sk);
  pendingUpgrades=[];
  STATE='GAME';
}

// ─── XP GEM ──────────────────────────────────────
class XPGem {
  constructor(x,y,val) { this.x=x; this.y=y; this.val=val; this.dead=false; this.t=0; }
  update(dt) {
    this.t+=dt;
    if (!player) return;
    const d=dist(this.x,this.y,player.x,player.y);
    const mag=player.getXpRadius();
    if (d<mag) {
      const ang=Math.atan2(player.y-this.y,player.x-this.x);
      const pull=lerp(2, 12, 1-d/mag);
      this.x+=Math.cos(ang)*pull; this.y+=Math.sin(ang)*pull;
    }
    if (d<18) { player.gainXP(this.val); this.dead=true; }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-20||sy<-20||sx>C.width+20||sy>C.height+20) return;
    const bob=Math.sin(this.t*0.005)*2;
    ctx.fillStyle='#8844ff'; ctx.strokeStyle='#cc88ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sx,sy+bob,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
}

// ─── CHEST ───────────────────────────────────────
class Chest {
  constructor(x,y) { this.x=x; this.y=y; this.dead=false; this.t=0; }
  update(dt) {
    this.t+=dt;
    if (!player||this.dead) return;
    if (dist(this.x,this.y,player.x,player.y)<30) {
      this.dead=true; chestsOpened++;
      const choices=getSkillChoices(player);
      if (choices.length>0) { pendingUpgrades=choices; STATE='CHEST'; }
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-30||sy<-30||sx>C.width+30||sy>C.height+30) return;
    const bob=Math.sin(this.t*0.003)*3;
    ctx.fillStyle='#cc9900'; ctx.fillRect(sx-12,sy-10+bob,24,20);
    ctx.fillStyle='#ffcc00'; ctx.fillRect(sx-10,sy-8+bob,20,8);
    ctx.strokeStyle='rgba(255,220,0,0.6)'; ctx.lineWidth=2;
    ctx.strokeRect(sx-14,sy-12+bob,28,24);
  }
}

// ─── LOOT DROP (weapon pickup) ────────────────────
class LootDrop {
  constructor(x,y,weapId) { this.x=x; this.y=y; this.weapId=weapId; this.dead=false; this.t=0; }
  update(dt) {
    this.t+=dt;
    if (!player||this.dead) return;
    if (dist(this.x,this.y,player.x,player.y)<30) {
      if (player.pickupWeapon(this.weapId)) this.dead=true;
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-30||sy<-30||sx>C.width+30||sy>C.height+30) return;
    const bob=Math.sin(this.t*0.004)*4;
    const def=WEAPON_DEFS[this.weapId]||{icon:'?',color:'#fff'};
    // Glow
    ctx.save();
    ctx.shadowColor=def.color; ctx.shadowBlur=12;
    ctx.fillStyle=def.color;
    ctx.beginPath(); ctx.arc(sx,sy+bob,10,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.font='14px Courier New'; ctx.textAlign='center';
    ctx.fillText(def.icon, sx, sy+bob+5);
  }
}

// ─── WEAPON CLASS ─────────────────────────────────
let projUID=0;
class Weapon {
  constructor(id, pl) {
    this.id=id; this.player=pl; this.level=1;
    this.timer=0;
    // Sword
    this.swingAnim=0; this.swingActive=false; this.swingHit=new Set();
    // Bow/Wand projectiles managed via projectiles array
    // Aura - continuous
    this.auraDmgTimer=0;
    // Dagger orbit
    this.dagAngle=0; this.dagHitCd=new Map();
    // Cross
    this.crosses=[];
    // Lightning
    this.lightningLines=[];
  }

  getLvlMult() { return 1 + (this.level-1)*0.25; }
  getCd() {
    const base={ sword:800, bow:1200, wand:1800, aura:9999, dagger:400, cross:3000, lightning:2500 }[this.id]||1000;
    return base / (this.player.getAtkSpdMult());
  }
  getDmg() {
    const base={ sword:12, bow:15, wand:20, aura:0, dagger:8, cross:18, lightning:25 }[this.id]||10;
    let d = base * this.getLvlMult() * this.player.getdmgMult();
    if (Math.random()<this.player.getCritChance()) d*=2;
    return Math.floor(d);
  }
  getArea() { return (1+this.player.mods.areaMult)*this.getLvlMult(); }
  getDurMult() { return 1+this.player.mods.durMult; }
  getExtraProj() { return this.player.mods.extraProj; }
  getPierce() { return this.player.mods.pierceAdd; }
  getAuraDps() {
    const base=5; return base*this.getLvlMult()*this.player.getdmgMult();
  }

  update(dt) {
    this.timer-=dt;
    // Update dagger hit cds
    for (const [k,v] of this.dagHitCd) { const nv=v-dt; if (nv<=0) this.dagHitCd.delete(k); else this.dagHitCd.set(k,nv); }
    this.lightningLines=this.lightningLines.filter(l=>{ l.timer-=dt; return l.timer>0; });

    const p=this.player;
    const px=p.x, py=p.y;

    if (this.id==='sword') {
      if (this.swingActive) {
        this.swingAnim+=dt*0.005;
        const r=50*this.getArea();
        for (const m of monsters) {
          if (m.dead||this.swingHit.has(m.uid)) continue;
          if (dist(px,py,m.x,m.y)<r) { m.takeDmg(this.getDmg()); this.swingHit.add(m.uid); }
        }
        if (this.swingAnim>=1) { this.swingActive=false; this.swingAnim=0; this.swingHit.clear(); }
      }
      if (this.timer<=0) {
        this.timer=this.getCd();
        this.swingActive=true; this.swingAnim=0; this.swingHit.clear();
      }
    }

    if (this.id==='bow') {
      if (this.timer<=0) {
        this.timer=this.getCd();
        const tgt=findNearest(px,py,900);
        if (tgt) {
          const count=1+this.getExtraProj();
          const baseAng=Math.atan2(tgt.y-py,tgt.x-px);
          for (let i=0;i<count;i++) {
            const a=baseAng+(i-(count-1)/2)*0.18;
            projectiles.push(new Proj(px,py,a,350,this.getDmg(),'#ffdd88','bow',900,this.getPierce()));
          }
        }
      }
    }

    if (this.id==='wand') {
      if (this.timer<=0) {
        this.timer=this.getCd();
        const count=1+this.getExtraProj();
        const nearby=monsters.filter(m=>!m.dead).sort((a,b)=>dist(px,py,a.x,a.y)-dist(px,py,b.x,b.y)).slice(0,count*2);
        for (let i=0;i<count&&i<nearby.length;i++) {
          projectiles.push(new HomingProj(px,py,this.getDmg(),'#cc88ff',nearby[i],5000*this.getDurMult(),this.getPierce()));
        }
      }
    }

    if (this.id==='aura') {
      const r=80*this.getArea();
      this.auraDmgTimer-=dt;
      if (this.auraDmgTimer<=0) {
        this.auraDmgTimer=500;
        const dps=this.getAuraDps()*0.5; // per 500ms tick
        for (const m of monsters) {
          if (!m.dead && dist(px,py,m.x,m.y)<r) m.takeDmg(dps);
        }
      }
    }

    if (this.id==='dagger') {
      this.dagAngle+=2*dt/1000;
      const count=2+this.getExtraProj(), r=65;
      for (let i=0;i<count;i++) {
        const a=this.dagAngle+(i/count)*Math.PI*2;
        const dx2=px+Math.cos(a)*r, dy2=py+Math.sin(a)*r;
        for (const m of monsters) {
          if (m.dead) continue;
          if (dist(dx2,dy2,m.x,m.y)<14) {
            if (!this.dagHitCd.has(m.uid)||this.dagHitCd.get(m.uid)<=0) {
              this.dagHitCd.set(m.uid,400);
              m.takeDmg(this.getDmg());
            }
          }
        }
      }
    }

    if (this.id==='cross') {
      for (const cr of this.crosses) {
        cr.x+=cr.vx*dt/1000; cr.y+=cr.vy*dt/1000; cr.life-=dt; cr.t+=dt;
        if (cr.x<10||cr.x>PW-10){cr.vx*=-1; cr.x=clamp(cr.x,10,PW-10);}
        if (cr.y<10||cr.y>PH-10){cr.vy*=-1; cr.y=clamp(cr.y,10,PH-10);}
        for (const m of monsters) {
          if (m.dead||cr.hit.has(m.uid)) continue;
          if (dist(cr.x,cr.y,m.x,m.y)<18) {
            cr.hit.add(m.uid); m.takeDmg(this.getDmg());
            if (cr.pierce<=0) cr.life=0; else cr.pierce--;
          }
        }
      }
      this.crosses=this.crosses.filter(cr=>cr.life>0);
      if (this.timer<=0) {
        this.timer=this.getCd();
        for (let i=0;i<1+this.getExtraProj();i++) {
          const angles=[Math.PI*0.25,Math.PI*0.75,-Math.PI*0.25,-Math.PI*0.75];
          const a=angles[i%4]+(Math.random()-0.5)*0.2;
          this.crosses.push({x:px,y:py,vx:Math.cos(a)*200,vy:Math.sin(a)*200,life:5000*this.getDurMult(),t:0,hit:new Set(),pierce:this.getPierce()});
        }
      }
    }

    if (this.id==='lightning') {
      if (this.timer<=0) {
        this.timer=this.getCd();
        const count=1+this.getExtraProj();
        const candidates=monsters.filter(m=>!m.dead&&dist(px,py,m.x,m.y)<500);
        for (let i=0;i<count&&candidates.length>0;i++) {
          const idx=Math.floor(Math.random()*candidates.length);
          const tgt=candidates.splice(idx,1)[0];
          tgt.takeDmg(this.getDmg());
          this.lightningLines.push({x1:px,y1:py,x2:tgt.x,y2:tgt.y,timer:150});
        }
      }
    }
  }

  draw() {
    const p=this.player;
    const px=p.x-cam.x, py=p.y-cam.y;
    if (this.id==='sword'&&this.swingActive) {
      const r=50*this.getArea();
      const startAng=p.faceAngle-Math.PI*0.5;
      const sweep=Math.PI*this.swingAnim;
      ctx.save();
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#aaaaff';
      ctx.beginPath(); ctx.moveTo(px,py);
      ctx.arc(px,py,r,startAng,startAng+sweep);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha=1;
      // Sword blade
      ctx.strokeStyle='#ccccff'; ctx.lineWidth=3;
      const a=startAng+sweep;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r); ctx.stroke();
      ctx.restore();
    }
    if (this.id==='aura') {
      const r=80*this.getArea();
      ctx.save();
      ctx.globalAlpha=0.12+Math.sin(Date.now()*0.003)*0.04;
      ctx.fillStyle='#44ffcc';
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.3;
      ctx.strokeStyle='#44ffcc'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    if (this.id==='dagger') {
      const count=2+this.getExtraProj(), r=65;
      for (let i=0;i<count;i++) {
        const a=this.dagAngle+(i/count)*Math.PI*2;
        const dx2=p.x+Math.cos(a)*r-cam.x, dy2=p.y+Math.sin(a)*r-cam.y;
        ctx.save(); ctx.translate(dx2,dy2); ctx.rotate(a+Math.PI/2);
        ctx.fillStyle='#aaaaff'; ctx.fillRect(-3,-10,6,20);
        ctx.fillStyle='#8888ff'; ctx.fillRect(-6,-2,12,4);
        ctx.restore();
      }
    }
    if (this.id==='cross') {
      for (const cr of this.crosses) {
        const sx=cr.x-cam.x, sy=cr.y-cam.y;
        if (sx<-40||sy<-40||sx>C.width+40||sy>C.height+40) continue;
        ctx.save(); ctx.translate(sx,sy); ctx.rotate(cr.t*0.002);
        ctx.fillStyle='#ffffaa';
        ctx.fillRect(-3,-12,6,24); ctx.fillRect(-12,-3,24,6);
        ctx.restore();
      }
    }
    if (this.id==='lightning') {
      for (const ln of this.lightningLines) {
        const alpha=ln.timer/150;
        ctx.save(); ctx.globalAlpha=alpha;
        ctx.strokeStyle='#aaaaff'; ctx.lineWidth=3;
        ctx.shadowColor='#8888ff'; ctx.shadowBlur=10;
        ctx.beginPath();
        ctx.moveTo(ln.x1-cam.x,ln.y1-cam.y);
        const steps=6;
        for (let i=1;i<steps;i++) {
          const t=i/steps;
          const jx=lerp(ln.x1-cam.x,ln.x2-cam.x,t)+(Math.random()-0.5)*20;
          const jy=lerp(ln.y1-cam.y,ln.y2-cam.y,t)+(Math.random()-0.5)*20;
          ctx.lineTo(jx,jy);
        }
        ctx.lineTo(ln.x2-cam.x,ln.y2-cam.y);
        ctx.stroke(); ctx.restore();
      }
    }
  }
}

// ─── PROJECTILE ──────────────────────────────────
class Proj {
  constructor(x,y,ang,spd,dmg,col,type,range=900,pierce=0) {
    this.x=x; this.y=y;
    this.vx=Math.cos(ang)*spd; this.vy=Math.sin(ang)*spd;
    this.dmg=dmg; this.col=col; this.type=type; this.range=range;
    this.pierce=pierce; this.dead=false; this.dist=0;
  }
  update(dt) {
    const mvx=this.vx*dt/1000, mvy=this.vy*dt/1000;
    this.x+=mvx; this.y+=mvy;
    this.dist+=Math.sqrt(mvx*mvx+mvy*mvy);
    if (this.dist>this.range||this.x<0||this.x>PW||this.y<0||this.y>PH){this.dead=true;return;}
    for (const m of monsters) {
      if (m.dead) continue;
      if (dist(this.x,this.y,m.x,m.y)<m.sz) {
        m.takeDmg(this.dmg);
        if (this.pierce>0){this.pierce--;}else{this.dead=true;return;}
      }
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-20||sy<-20||sx>C.width+20||sy>C.height+20) return;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(sx-2,sy-2,2.5,0,Math.PI*2); ctx.fill();
  }
}

class HomingProj {
  constructor(x,y,dmg,col,target,lifetime,pierce=0) {
    this.x=x; this.y=y; this.dmg=dmg; this.col=col;
    this.target=target; this.life=lifetime; this.pierce=pierce;
    this.dead=false;
    const ang=Math.atan2(target.y-y,target.x-x);
    this.vx=Math.cos(ang)*200; this.vy=Math.sin(ang)*200;
  }
  update(dt) {
    this.life-=dt;
    if (this.life<=0||this.x<0||this.x>PW||this.y<0||this.y>PH){this.dead=true;return;}
    if (this.target&&!this.target.dead) {
      const ang=Math.atan2(this.target.y-this.y,this.target.x-this.x);
      const turn=3*dt/1000;
      this.vx+=Math.cos(ang)*turn*200; this.vy+=Math.sin(ang)*turn*200;
      const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if (spd>220){this.vx=this.vx/spd*220; this.vy=this.vy/spd*220;}
    }
    this.x+=this.vx*dt/1000; this.y+=this.vy*dt/1000;
    for (const m of monsters) {
      if (m.dead) continue;
      if (dist(this.x,this.y,m.x,m.y)<m.sz) {
        m.takeDmg(this.dmg);
        if (this.pierce>0){this.pierce--;this.target=null;}else{this.dead=true;return;}
      }
    }
  }
  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-20||sy<-20||sx>C.width+20||sy>C.height+20) return;
    ctx.save();
    ctx.shadowColor=this.col; ctx.shadowBlur=8;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─── PLAYER ──────────────────────────────────────
class Player {
  constructor(cfg) {
    this.cfg=cfg;
    this.x=MW/2*TW; this.y=MH/2*TW;
    this.maxHp=cfg.hp; this.hp=cfg.hp;
    this.baseDmg=cfg.dmg;
    this.baseSpeed=cfg.speed;
    this.baseXpRadius=80;
    this.baseCrit=cfg.crit;
    this.baseAtkSpd=cfg.atkSpd;
    this.mods={
      dmgMult:0, spdAdd:0, atkSpdMult:0, xpRadAdd:0,
      maxHpAdd:0, hpRegenAdd:0, critAdd:0, dxpAdd:0,
      thornsDmg:0, thornsRad:0, slowRad:0, slowPct:0,
      extraProj:0, pierceAdd:0, areaMult:0, durMult:0
    };
    // Passive from class
    if (cfg.passiveType==='pierce') this.mods.pierceAdd=1;
    this.skills=new Map();
    this.weapons=[new Weapon(cfg.startWeapon, this)];
    this.dir='down'; this.faceAngle=0;
    this.xp=0; this.level=1; this.xpNext=60;
    this.invincible=0;
    this.animT=0; this.animFrame=0; this.moving=false;
    this.regenAccum=0;
    // Knight regen timer
    this.passiveRegenTimer=0;
  }

  getdmgMult() { return 1+this.mods.dmgMult; }
  getAtkSpdMult() { return (1+this.mods.atkSpdMult)*this.baseAtkSpd * (this._berserkActive()?1.5:1); }
  getXpRadius() { return this.baseXpRadius+this.mods.xpRadAdd; }
  getCritChance() { return Math.min(0.9,this.baseCrit+this.mods.critAdd); }
  getSpeed() { return this.baseSpeed+this.mods.spdAdd; }
  getAreaMult() { return 1+this.mods.areaMult; }
  getMaxHp() { return this.maxHp+this.mods.maxHpAdd; }
  _berserkActive() { return this.cfg.passiveType==='berserk' && this.hp<=(this.maxHp*0.30); }
  _dodgeRoll() { return this.cfg.passiveType==='dodge' && Math.random()<0.15; }

  gainXP(amt) {
    if (Math.random()<this.mods.dxpAdd) amt*=2;
    this.xp+=amt;
    while (this.xp>=this.xpNext) {
      this.xp-=this.xpNext;
      this.xpNext=Math.floor(this.xpNext*1.5);
      this.level++;
      burst(this.x,this.y,'#ffff00',20);
      const choices=getSkillChoices(this);
      if (choices.length>0) {
        pendingUpgrades=choices;
        STATE='LEVELUP';
        return; // Only one level-up screen at a time
      }
    }
  }

  applySkill(sk) {
    const cur=this.skills.get(sk.id)||0;
    this.skills.set(sk.id,cur+1);
    if (sk.fx) {
      for (const [k,v] of Object.entries(sk.fx)) {
        if (k==='maxHpAdd') { this.maxHp+=v; this.hp=Math.min(this.hp+v,this.maxHp); }
        else if (this.mods[k]!==undefined) this.mods[k]+=v;
      }
    }
  }

  pickupWeapon(weapId) {
    // Check if already have it - upgrade
    const existing=this.weapons.find(w=>w.id===weapId);
    if (existing) { existing.level=Math.min(existing.level+1,5); return true; }
    if (this.weapons.length>=MAX_WEAPONS) return false; // inventory full
    this.weapons.push(new Weapon(weapId,this));
    return true;
  }

  discardWeapon(idx) {
    if (idx<0||idx>=this.weapons.length||this.weapons.length<=1) return;
    this.weapons.splice(idx,1);
  }

  getFaceAngle() {
    let dx=0,dy=0;
    if (keys.has('KeyW')||keys.has('ArrowUp'))   dy=-1;
    if (keys.has('KeyS')||keys.has('ArrowDown'))  dy+=1;
    if (keys.has('KeyA')||keys.has('ArrowLeft'))  dx-=1;
    if (keys.has('KeyD')||keys.has('ArrowRight')) dx+=1;
    if (dx!==0||dy!==0){this.faceAngle=Math.atan2(dy,dx);return this.faceAngle;}
    const near=findNearest(this.x,this.y,400);
    if (near){this.faceAngle=Math.atan2(near.y-this.y,near.x-this.x);}
    return this.faceAngle;
  }

  update(dt) {
    if (STATE!=='GAME') return;
    if (this.invincible>0) this.invincible-=dt;
    // Movement
    let dx=0,dy=0;
    const spd=this.getSpeed()*60; // px/s
    if (keys.has('KeyW')||keys.has('ArrowUp'))   dy-=spd;
    if (keys.has('KeyS')||keys.has('ArrowDown'))  dy+=spd;
    if (keys.has('KeyA')||keys.has('ArrowLeft'))  dx-=spd;
    if (keys.has('KeyD')||keys.has('ArrowRight')) dx+=spd;
    this.moving=(dx!==0||dy!==0);
    if (dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
    const nx=this.x+dx*dt/1000, ny=this.y+dy*dt/1000;
    this.x=clamp(nx,TW,PW-TW);
    this.y=clamp(ny,TW,PH-TW);
    // Direction
    this.dir=angleToDir(this.getFaceAngle());
    // Animate
    this.animT+=dt;
    if (this.animT>200){this.animT=0;this.animFrame=(this.animFrame+1)%2;}
    // Weapons
    for (const w of this.weapons) w.update(dt);
    // Thorns
    if (this.mods.thornsDmg>0) {
      for (const m of monsters) {
        if (!m.dead&&dist(this.x,this.y,m.x,m.y)<this.mods.thornsRad)
          m.takeDmg(this.mods.thornsDmg*dt/1000);
      }
    }
    // Slow aura
    if (this.mods.slowRad>0) {
      for (const m of monsters) {
        if (!m.dead) { m.slowed=dist(this.x,this.y,m.x,m.y)<this.mods.slowRad; m.slowPct=this.mods.slowPct; }
      }
    }
    // HP regen (base from skill)
    const totalRegen=this.mods.hpRegenAdd;
    if (totalRegen>0) {
      this.regenAccum+=dt;
      while (this.regenAccum>=1000){this.regenAccum-=1000;this.hp=Math.min(this.hp+totalRegen,this.maxHp);}
    }
    // Knight passive regen 1hp/5s
    if (this.cfg.passiveType==='regen') {
      this.passiveRegenTimer+=dt;
      if (this.passiveRegenTimer>=5000){this.passiveRegenTimer=0;this.hp=Math.min(this.hp+1,this.maxHp);}
    }
    // Camera
    cam.x=clamp(this.x-C.width/2,0,PW-C.width);
    cam.y=clamp(this.y-C.height/2,0,PH-C.height);
  }

  takeDmg(dmg) {
    if (this.invincible>0) return;
    if (this._dodgeRoll()) { burst(this.x,this.y,'#aaffaa',5); return; }
    this.hp-=dmg;
    this.invincible=400;
    burst(this.x,this.y,'#ff4444',5);
    if (this.hp<=0){this.hp=0;STATE='GAMEOVER';}
  }

  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (this.invincible>0&&Math.floor(this.invincible/80)%2===1) return;
    ctx.imageSmoothingEnabled=true;
    drawCharSprite(this.cfg.sprName,this.dir,sx,sy,72);
    ctx.imageSmoothingEnabled=false;
    for (const w of this.weapons) w.draw();
    if (this.mods.slowRad>0){ctx.globalAlpha=0.08;ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(sx,sy,this.mods.slowRad,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    if (this.mods.thornsRad>0){ctx.globalAlpha=0.08;ctx.fillStyle='#44ff44';ctx.beginPath();ctx.arc(sx,sy,this.mods.thornsRad,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    // Berserker rage glow
    if (this._berserkActive()){ctx.globalAlpha=0.15;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(sx,sy,50,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  }
}

// ─── ENEMY SPRITE MAP ────────────────────────────
const ENEMY_BY_LVL = {
  1: { normal:['dima','kiril','yula'],  elite:['vadim'],         spr:['enemy_lvl1_bat','enemy_lvl1_slime'] },
  2: { normal:['dima','kiril'],         elite:['vadim','Alex'],  spr:['enemy_lvl2_bone','enemy_lvl2_zombie'] },
  3: { normal:['kiril','yula'],         elite:['Alex','alexandr'],spr:['enemy_lvl3_ghost','enemy_lvl3_golem'] },
  4: { normal:['alexandr'],             elite:['vadim','Alex'],  spr:['enemy_lvl4_dragon'] },
};

let monUID=0;
class Monster {
  constructor(x,y,type,lvl) {
    this.uid=monUID++;
    this.x=x; this.y=y;
    this.type=type; this.dead=false; this.t=0;
    this.slowed=false; this.slowPct=0;
    const lv=clamp(lvl||enemyLvl,1,4);
    this.lvl=lv;

    if (type==='boss') {
      this.hp=600+lv*150; this.maxHp=this.hp;
      this.dmg=20+lv*5; this.baseSpeed=(55+lv*5)/1000; this.xpVal=20+lv*5;
      this.sz=44; this.col='#ff00ff'; this.isBoss=true;
      this.sprKey=null; this.sprName=null;
    } else if (type==='elite') {
      this.hp=70+lv*20; this.maxHp=this.hp;
      this.dmg=12+lv*3; this.baseSpeed=(80+lv*8)/1000; this.xpVal=3+lv*2;
      this.sz=28; this.col='#ff8800'; this.isElite=true;
      const pool=ENEMY_BY_LVL[lv]||ENEMY_BY_LVL[1];
      this.sprKey=rnd(pool.spr);
      this.sprName=rnd(pool.elite);
    } else {
      this.hp=20+lv*8; this.maxHp=this.hp;
      this.dmg=6+lv*2; this.baseSpeed=(70+lv*6)/1000; this.xpVal=1+lv;
      this.sz=20; this.col='#cc4422';
      const pool=ENEMY_BY_LVL[lv]||ENEMY_BY_LVL[1];
      this.sprKey=rnd(pool.spr);
      this.sprName=rnd(pool.normal);
    }
    this.speed=this.baseSpeed;
    this.animFrame=0; this.animT=0;
    this.dir='down'; this.hitFlash=0;
    this.atkTimer=600+Math.random()*600;
  }

  takeDmg(dmg) {
    if (this.dead) return;
    this.hp-=dmg; this.hitFlash=150;
    if (this.hp<=0) {
      this.hp=0; this.dead=true; kills++;
      gems.push(new XPGem(this.x,this.y,this.xpVal));
      burst(this.x,this.y,this.col,8);
      // Boss drops chest
      if (this.isBoss) chests.push(new Chest(this.x,this.y));
      // Enemy drops weapon (chance)
      const dropChance=this.isBoss?0.7:this.isElite?0.15:0.03;
      if (Math.random()<dropChance) {
        const wids=Object.keys(WEAPON_DEFS);
        lootDrops.push(new LootDrop(this.x,this.y,rnd(wids)));
      }
    }
  }

  update(dt) {
    if (this.dead) return;
    this.t+=dt; this.hitFlash=Math.max(0,this.hitFlash-dt);
    let spd=this.baseSpeed;
    if (this.slowed&&this.slowPct>0) spd*=(1-this.slowPct);
    this.slowed=false;
    if (!player) return;
    const ang=Math.atan2(player.y-this.y,player.x-this.x);
    this.dir=angleToDir(ang);
    this.x=clamp(this.x+Math.cos(ang)*spd*dt,this.sz,PW-this.sz);
    this.y=clamp(this.y+Math.sin(ang)*spd*dt,this.sz,PH-this.sz);
    this.animT+=dt;
    if (this.animT>250){this.animT=0;this.animFrame=(this.animFrame+1)%2;}
    this.atkTimer-=dt;
    if (dist(this.x,this.y,player.x,player.y)<this.sz+16&&this.atkTimer<=0) {
      this.atkTimer=1200; player.takeDmg(this.dmg);
    }
  }

  draw() {
    const sx=this.x-cam.x, sy=this.y-cam.y;
    if (sx<-100||sy<-100||sx>C.width+100||sy>C.height+100) return;
    const flash=this.hitFlash>0;
    const tgtH=this.isBoss?96:this.isElite?64:48;
    if (flash) ctx.globalAlpha=0.5;
    // Try enemy/ sprite first, fallback to character sprite
    const usedSpr = this.sprKey&&imgs[this.sprKey] ?
      drawEnemySprite(this.sprKey,sx,sy,tgtH) : false;
    if (!usedSpr&&this.sprName) drawCharSprite(this.sprName,this.dir,sx,sy,tgtH);
    if (!usedSpr&&!this.sprName) this._drawShape(sx,sy);
    if (flash) ctx.globalAlpha=1;
    // HP bar
    const bw=Math.max(30,this.sz*2.2),bh=4,bx=sx-bw/2,by=sy-tgtH-6;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=this.isBoss?'#ff00ff':this.isElite?'#ff8800':'#44dd44';
    ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    if (this.isBoss){
      ctx.font='bold 10px Courier New'; ctx.fillStyle='#fff'; ctx.textAlign='center';
      ctx.fillText('БОСС Ур.'+this.lvl,sx,sy-tgtH-10);
    }
  }

  _drawShape(sx,sy) {
    ctx.fillStyle=this.hitFlash>0?'#fff':this.col;
    if (this.isBoss){
      ctx.fillRect(sx-this.sz/2,sy-this.sz/2,this.sz,this.sz);
    } else {
      ctx.beginPath(); ctx.arc(sx,sy,this.sz,0,Math.PI*2); ctx.fill();
    }
  }
}

// ─── SPAWN ───────────────────────────────────────
function spawnEnemy() {
  if (monsters.filter(m=>!m.dead).length>=150+(enemyLvl-1)*50) return;
  if (!player) return;
  const side=Math.floor(Math.random()*4);
  let x,y; const margin=100;
  if (side===0){x=player.x-C.width/2-margin;y=player.y+(Math.random()-0.5)*C.height;}
  else if (side===1){x=player.x+C.width/2+margin;y=player.y+(Math.random()-0.5)*C.height;}
  else if (side===2){x=player.x+(Math.random()-0.5)*C.width;y=player.y-C.height/2-margin;}
  else{x=player.x+(Math.random()-0.5)*C.width;y=player.y+C.height/2+margin;}
  x=clamp(x,50,PW-50); y=clamp(y,50,PH-50);
  const eliteChance=0.06+enemyLvl*0.03;
  monsters.push(new Monster(x,y,Math.random()<eliteChance?'elite':'normal',enemyLvl));
}

// ─── HUD ─────────────────────────────────────────
function drawHUD() {
  if (!player) return;
  // Timer
  const remain=Math.max(0,GAME_DURATION-gameTime);
  const mins=Math.floor(remain/60000), secs=Math.floor((remain%60000)/1000);
  const timeStr=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  ctx.font='bold 22px Courier New'; ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(timeStr,C.width/2+1,31);
  ctx.fillStyle='#ffffff'; ctx.fillText(timeStr,C.width/2,30);
  // Kills, Level
  ctx.textAlign='left'; ctx.font='14px Courier New';
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillText('Убито: '+kills,11,21);
  ctx.fillStyle='#ffdd88'; ctx.fillText('Убито: '+kills,10,20);
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillText('Ур. '+player.level,11,41);
  ctx.fillStyle='#88ffdd'; ctx.fillText('Ур. '+player.level,10,40);
  // Wave/EnemyLvl
  ctx.textAlign='right'; ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillText('Волна '+wave+' (lv'+enemyLvl+')',C.width-9,21);
  ctx.fillStyle='#ffaa44'; ctx.fillText('Волна '+wave+' (lv'+enemyLvl+')',C.width-10,20);
  // [I] inventory hint
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px Courier New';
  ctx.fillText('[I] Инвентарь',C.width-10,40);
  // XP bar
  const bw=300,bh=14,bx=(C.width-bw)/2,by=C.height-30;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);

  const grad=ctx.createLinearGradient(bx,0,bx+bw,0);

  ctx.textAlign='center'; ctx.font='10px Courier New'; ctx.fillStyle='#ddaaff';

  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(hbx-1,hby-1,hbw+2,hbh+2);
  ctx.fillStyle='#330000'; ctx.fillRect(hbx,hby,hbw,hbh);
  const hpPct=player.hp/player.maxHp;
  const hgrad=ctx.createLinearGradient(hbx,0,hbx+hbw,0);
  hgrad.addColorStop(0,'#cc1111'); hgrad.addColorStop(1,'#ff4444');
  ctx.fillStyle=hgrad; ctx.fillRect(hbx,hby,hbw*hpPct,hbh);
  ctx.strokeStyle='#661111'; ctx.lineWidth=1; ctx.strokeRect(hbx,hby,hbw,hbh);

  ctx.fillText('HP '+Math.ceil(player.hp)+'/'+player.maxHp,hbx+4,hby+12);

  drawMinimap();
  // Weapon slots
  drawWeaponSlots();
}

function drawWeaponSlots() {
  if (!player) return;
  const slotW=44, slotH=44, gap=4, startX=C.width/2-((MAX_WEAPONS*(slotW+gap))-gap)/2, startY=C.height-80;
  for (let i=0;i<MAX_WEAPONS;i++) {
    const sx=startX+i*(slotW+gap), sy=startY;
    const w=player.weapons[i];
    ctx.fillStyle=w?'rgba(0,0,0,0.7)':'rgba(0,0,0,0.3)';
    ctx.fillRect(sx,sy,slotW,slotH);
    ctx.strokeStyle=w?'#666688':'#333355'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,slotW,slotH);
    if (w) {
      const def=WEAPON_DEFS[w.id]||{icon:'?',color:'#fff'};
      ctx.font='20px Courier New'; ctx.textAlign='center';
      ctx.fillText(def.icon,sx+slotW/2,sy+slotH/2+7);
      // Level
      ctx.font='9px Courier New'; ctx.fillStyle='#ffdd88';
      ctx.fillText('Lv'+w.level,sx+slotW/2,sy+slotH-3);
    }
  }
}

function drawMinimap() {
  const mw=120,mh=68,mx2=C.width-mw-10,my2=C.height-mh-10-50;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(mx2,my2,mw,mh);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; ctx.strokeRect(mx2,my2,mw,mh);
  if (!player) return;
  const scaleX=mw/PW, scaleY=mh/PH;
  for (const m of monsters) {
    if (m.dead) continue;
    ctx.fillStyle=m.isBoss?'#ff00ff':m.isElite?'#ff8800':'#ff4444';
    ctx.fillRect(mx2+m.x*scaleX-1,my2+m.y*scaleY-1,2,2);
  }
  ctx.fillStyle='#00ff88';
  ctx.beginPath(); ctx.arc(mx2+player.x*scaleX,my2+player.y*scaleY,3,0,Math.PI*2); ctx.fill();
}

// ─── GAME START ──────────────────────────────────
function startGame() {
  player=new Player(selectedChar);
  monsters=[]; projectiles=[]; gems=[]; particles=[]; chests=[]; lootDrops=[];
  kills=0; wave=1; enemyLvl=1; gameTime=0; waveTimer=0; bossTimer=0; spawnTimer=0;
  chestsOpened=0; pendingUpgrades=[]; inventorySelected=-1;
  cam.x=player.x-C.width/2; cam.y=player.y-C.height/2;
  STATE='GAME';
}

// ─── MAIN UPDATE ─────────────────────────────────
let lastTime=0;
function update(now) {
  const dt=Math.min(now-lastTime,100);
  lastTime=now;

  if (STATE==='GAME') {
    gameTime+=dt;
    if (gameTime>=GAME_DURATION){STATE='WIN';}

    // Wave: every 3 min, new enemy level
    waveTimer+=dt;
    if (waveTimer>=WAVE_INTERVAL) {
      waveTimer=0; wave++;
      enemyLvl=Math.min(4,Math.ceil(wave/1)); // lvl up each wave
    }
    // Boss: every 3 min
    bossTimer+=dt;
    if (bossTimer>=BOSS_INTERVAL) {
      bossTimer=0;
      if (player&&monsters.filter(m=>!m.dead).length<600) {
        const side=Math.floor(Math.random()*4);
        let bx2,by2; const m=120;
        if (side===0){bx2=player.x-C.width/2-m;by2=player.y+(Math.random()-0.5)*C.height;}
        else if (side===1){bx2=player.x+C.width/2+m;by2=player.y+(Math.random()-0.5)*C.height;}
        else if (side===2){bx2=player.x+(Math.random()-0.5)*C.width;by2=player.y-C.height/2-m;}
        else{bx2=player.x+(Math.random()-0.5)*C.width;by2=player.y+C.height/2+m;}
        monsters.push(new Monster(clamp(bx2,80,PW-80),clamp(by2,80,PH-80),'boss',enemyLvl));
      }
    }
    // Spawn
    spawnTimer+=dt;
    const spawnInterval=Math.max(80,500-wave*20);
    while (spawnTimer>=spawnInterval){spawnTimer-=spawnInterval;spawnEnemy();}

    if (player) player.update(dt);
    for (const m of monsters) m.update(dt);
    monsters=monsters.filter(m=>!m.dead);
    for (const p of projectiles) p.update(dt);
    projectiles=projectiles.filter(p=>!p.dead);
    for (const g of gems) g.update(dt);
    gems=gems.filter(g=>!g.dead);
    for (const ch of chests) ch.update(dt);
    chests=chests.filter(ch=>!ch.dead);
    for (const ld of lootDrops) ld.update(dt);
    lootDrops=lootDrops.filter(ld=>!ld.dead);
    for (const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=dt;}
    particles=particles.filter(p=>p.life>0);
  }

  draw();
  requestAnimationFrame(update);
}

// ─── MAIN DRAW ───────────────────────────────────
function draw() {
  ctx.clearRect(0,0,C.width,C.height);
  if (STATE==='TITLE'){drawTitle();return;}
  if (STATE==='SELECT'){drawSelect();return;}
  if (STATE==='WIN'){drawWin();return;}

  // Scenes with game world background
  if (STATE==='GAME'||STATE==='LEVELUP'||STATE==='CHEST'||STATE==='INVENTORY'||STATE==='GAMEOVER') {
    drawMapBg();
    for (const g of gems) g.draw();
    for (const ch of chests) ch.draw();
    for (const ld of lootDrops) ld.draw();
    for (const m of monsters) m.draw();
    for (const p of projectiles) p.draw();
    drawParticles();
    if (player) player.draw();
  }

  if (STATE==='GAME'&&player) drawHUD();
  if (STATE==='LEVELUP') drawUpgradeScreen('НОВЫЙ УРОВЕНЬ!');
  if (STATE==='CHEST') drawUpgradeScreen('СУНДУК ОТКРЫТ!');
  if (STATE==='INVENTORY') drawInventory();
  if (STATE==='GAMEOVER') drawGameOver();
}

function drawParticles() {
  for (const p of particles) {
    const sx=p.x-cam.x, sy=p.y-cam.y;
    if (sx<-10||sy<-10||sx>C.width+10||sy>C.height+10) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.ml);
    ctx.fillStyle=p.col; ctx.fillRect(sx-2,sy-2,4,4);
  }
  ctx.globalAlpha=1;
}

// ─── BOOT ────────────────────────────────────────
function waitLoad() {
  if (loaded<total) {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,C.width,C.height);
    ctx.fillStyle='#00ff88'; ctx.font='20px Courier New'; ctx.textAlign='center';
    ctx.fillText('ЗАГРУЗКА... '+loaded+'/'+total,C.width/2,C.height/2);
    ctx.fillStyle='#333'; ctx.fillRect(C.width/2-100,C.height/2+20,200,12);
    ctx.fillStyle='#00ff88';
    if (total>0) ctx.fillRect(C.width/2-100,C.height/2+20,(loaded/total)*200,12);
    requestAnimationFrame(waitLoad);
    return;
  }
  lastTime=performance.now();
  requestAnimationFrame(update);
}
waitLoad();
</script>
